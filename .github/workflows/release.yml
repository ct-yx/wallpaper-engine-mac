name: Release macOS app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to package, for example v0.8.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Package and publish
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Build and ad-hoc sign app bundle
        env:
          DERIVED_DATA: ${{ runner.temp }}/open-wallpaper-engine-derived-data
          DIST_DIR: ${{ github.workspace }}/dist
        run: |
          set -euo pipefail

          xcodebuild \
            -project "Open Wallpaper Engine.xcodeproj" \
            -scheme "Open Wallpaper Engine" \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

          app_path="$DERIVED_DATA/Build/Products/Release/Open Wallpaper Engine.app"
          entitlements="Open Wallpaper Engine/Open_Wallpaper_Engine.entitlements"
          test -d "$app_path"

          codesign \
            --force \
            --sign - \
            --timestamp=none \
            --options runtime \
            --entitlements "$entitlements" \
            "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"

          mkdir -p "$DIST_DIR"
          archive_name="Open-Wallpaper-Engine-${RELEASE_TAG}-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$DIST_DIR/$archive_name"
          (
            cd "$DIST_DIR"
            shasum -a 256 "$archive_name" > "$archive_name.sha256"
          )

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Open-Wallpaper-Engine-${{ env.RELEASE_TAG }}-macOS
          path: dist/
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          archive="dist/Open-Wallpaper-Engine-${RELEASE_TAG}-macOS.zip"
          checksum="${archive}.sha256"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$archive" "$checksum" --clobber
          else
            gh release create "$RELEASE_TAG" "$archive" "$checksum" \
              --title "Open Wallpaper Engine ${RELEASE_TAG}" \
              --generate-notes
          fi
